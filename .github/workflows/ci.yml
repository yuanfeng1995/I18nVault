name: CI
on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            cli_dir: build/bin
            exe_ext: ""
          - os: macos-latest
            cli_dir: build/bin
            exe_ext: ""
          - os: windows-latest
            cli_dir: build/bin/Release
            exe_ext: ".exe"
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: i18n key diff check (strict)
        run: |
          python tools/i18n_diff_check.py i18n/en_US.json --strict --github-annotations

      - name: Build
        shell: bash
        run: |
          cmake -S . -B build
          cmake --build build --config Release

      - name: Test
        shell: bash
        run: |
          ctest --test-dir build -C Release --output-on-failure

      - name: Verify TRS artifacts
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          for path in [Path("i18n/en_US.trs"), Path("i18n/zh_CN.trs")]:
              if not path.exists():
                  raise SystemExit(f"missing artifact: {path}")
          print("[OK] trs artifacts exist")
          PY

      - name: Verify SM4-GCM roundtrip
        shell: bash
        run: |
          KEY=00112233445566778899AABBCCDDEEFF
          AAD=i18n:v1
          "${{ matrix.cli_dir }}/i18n_crypto_cli${{ matrix.exe_ext }}" dec -i i18n/zh_CN.trs -o build/zh_CN.dec.json -k ${KEY} --aad ${AAD}
          python - <<'PY'
          from pathlib import Path
          src = Path("i18n/zh_CN.json").read_bytes()
          dec = Path("build/zh_CN.dec.json").read_bytes()
          if src != dec:
              raise SystemExit("roundtrip mismatch")
          print("[OK] roundtrip verified")
          PY

  # ══════════════════════════════════════════
  # Source package — only on ubuntu to avoid duplicates
  # ══════════════════════════════════════════
  source-package:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create source archive
        run: |
          VERSION=$(grep -oP 'VERSION \K[0-9]+\.[0-9]+\.[0-9]+' CMakeLists.txt | head -1)
          PREFIX="I18nVault-${VERSION}"
          git archive --format=tar.gz --prefix="${PREFIX}/" -o "${PREFIX}-source.tar.gz" HEAD
          git archive --format=zip   --prefix="${PREFIX}/" -o "${PREFIX}-source.zip" HEAD
          echo "VERSION=${VERSION}" >> "$GITHUB_ENV"
          echo "PREFIX=${PREFIX}"   >> "$GITHUB_ENV"

      - name: Verify source archive
        run: |
          python3 - <<'PY'
          import tarfile, os
          version = os.environ["VERSION"]
          prefix  = os.environ["PREFIX"]
          with tarfile.open(f"{prefix}-source.tar.gz") as t:
              names = t.getnames()
          required = [
              f"{prefix}/CMakeLists.txt",
              f"{prefix}/src/i18n_manager.h",
              f"{prefix}/src/i18n_manager.cpp",
              f"{prefix}/src/CMakeLists.txt",
              f"{prefix}/i18n/en_US.json",
              f"{prefix}/tools/gen_i18n_keys.py",
          ]
          missing = [f for f in required if f not in names]
          if missing:
              raise SystemExit("missing in source archive:\n" + "\n".join(missing))
          print(f"[OK] source archive verified ({len(names)} entries)")
          PY

      - name: Upload source archive
        uses: actions/upload-artifact@v4
        with:
          name: I18nVault-source
          path: |
            I18nVault-*-source.tar.gz
            I18nVault-*-source.zip

  # ══════════════════════════════════════════
  # Release job — runs only on v* tags
  # ══════════════════════════════════════════
  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build, source-package]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download source archive
        uses: actions/download-artifact@v4
        with:
          name: I18nVault-source
          path: release-assets

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: release-assets/*